<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Con3 — Construction RTS</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0f14; }
      #renderCanvas { width: 100%; height: 100%; display: block; touch-action: none; }
      #hud {
        position: fixed; bottom: 12px; left: 12px;
        font: 13px/1.5 system-ui, sans-serif; color: #fff;
        background: rgba(0, 0, 0, 0.45); padding: 8px 12px; border-radius: 6px;
        pointer-events: none; user-select: none;
      }
      #hud b { color: #ffe27a; }
      #resources {
        position: fixed; top: 12px; right: 12px;
        font: 14px/1.5 system-ui, sans-serif; color: #fff;
        background: rgba(0, 0, 0, 0.55); padding: 8px 14px; border-radius: 6px;
        pointer-events: none; user-select: none;
      }
      #resources b { color: #ffe27a; }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="resources"></div>
    <div id="hud">
      <div><b>Left-click</b> select worker &nbsp; <b>Right-click pile</b> gather &nbsp; <b>Right-click ground</b> move</div>
      <div><b>WASD / arrows / screen edge</b> pan &nbsp; <b>Wheel</b> zoom</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
